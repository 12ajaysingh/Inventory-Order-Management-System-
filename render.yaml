services:
  - type: web
    name: inventory-order-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-order-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: BACKEND_PORT
        value: 8000

databases:
  - name: inventory-order-db
    plan: free
